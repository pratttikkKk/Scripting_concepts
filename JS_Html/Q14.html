<html>
<head>
<title>Key up page</title>
</head>
<body>
<h2 id="text" onmouseover="changecolor()" ondblclick="Size()">My Name Is Pratik</h2>

<script>

function changecolor(){
document.getElementById("text").style.color ="red";
}

function Size(){
document.getElementById("text").style.fontSize="50px";
}

</script>
</body>
</html>
