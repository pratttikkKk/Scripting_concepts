<html>
<head>
<title>Key up page</title>
</head>
<body>

<Button id="button" onmouseover="changecolor()" onclick="display()">        Click Me
</Button>
<h1 id="result"></h1>

<script>

function changecolor(){
document.getElementById("button").style.backgroundColor="red";
}

function display(){
document.getElementById("result").innerHTML = "Button Clicked";

}

</script>
</body>
</html>
