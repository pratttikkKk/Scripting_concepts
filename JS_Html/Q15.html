<html>
<head>
<title>Key up page</title>
</head>
<body>

<input type="text" id="text" onkeyup="event1()" onkeydown="event2()">
<h1 id="result"></h1>

<script>

function event1(){
document.getElementById("result").innerHTML = "key released";
}

function event2(){
document.getElementById("result").innerHTML = "key pressed";

}

</script>
</body>
</html>
